name: Reopen issue if linked PRs are open

on:
  workflow_call:
    inputs:
      project_owner:
        description: Organization or user login that owns the backlog repository
        required: true
        type: string
      backlog_repo:
        description: Repository name where backlog issues live
        required: true
        type: string
      issue_number:
        description: Issue number override; falls back to github.event.issue.number when omitted
        required: false
        type: string
      auth_mode:
        required: false
        default: pat
        type: string
      installation_owner:
        required: false
        type: string
    secrets:
      project_token:
        required: false
      pat_token:
        required: false
      app_id:
        required: false
      app_private_key:
        required: false

jobs:
  check-and-reopen:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: read
    env:
      AUTH_MODE: ${{ inputs.auth_mode }}
      INSTALLATION_OWNER: ${{ inputs.installation_owner }}
      DIRECT_TOKEN: ${{ secrets.project_token }}
      PAT_TOKEN: ${{ secrets.pat_token }}
      APP_ID: ${{ secrets.app_id }}
      APP_PRIVATE_KEY: ${{ secrets.app_private_key }}

    steps:
      - name: Validate workflow auth configuration
        shell: bash
        run: |
          if [ -n "$DIRECT_TOKEN" ]; then
            exit 0
          fi

          case "$AUTH_MODE" in
            pat)
              if [ -z "$PAT_TOKEN" ]; then
                echo "pat_token secret is required when auth_mode=pat and project_token is not provided" >&2
                exit 1
              fi
              ;;
            app)
              if [ -z "$APP_ID" ] || [ -z "$APP_PRIVATE_KEY" ] || [ -z "$INSTALLATION_OWNER" ]; then
                echo "app_id, app_private_key, and installation_owner are required when auth_mode=app and project_token is not provided" >&2
                exit 1
              fi
              ;;
            *)
              echo "Unsupported auth_mode: $AUTH_MODE" >&2
              exit 1
              ;;
          esac

      - name: Normalize GitHub App private key
        if: ${{ env.DIRECT_TOKEN == '' && env.AUTH_MODE == 'app' }}
        id: normalize-key
        shell: bash
        run: |
          if [[ "$APP_PRIVATE_KEY" == *'\n'* ]]; then
            printf 'private_key<<EOF\n%b\nEOF\n' "$APP_PRIVATE_KEY" >> "$GITHUB_OUTPUT"
          else
            printf 'private_key<<EOF\n%s\nEOF\n' "$APP_PRIVATE_KEY" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub App installation token
        if: ${{ env.DIRECT_TOKEN == '' && env.AUTH_MODE == 'app' }}
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.app_id }}
          private-key: ${{ steps.normalize-key.outputs.private_key }}
          owner: ${{ inputs.installation_owner }}
          skip-token-revoke: true

      - name: Resolve workflow auth token
        id: auth
        shell: bash
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [ -n "$DIRECT_TOKEN" ]; then
            TOKEN="$DIRECT_TOKEN"
          else
            case "$AUTH_MODE" in
              pat)
                TOKEN="$PAT_TOKEN"
                ;;
              app)
                TOKEN="$APP_TOKEN"
                ;;
              *)
                echo "Unsupported auth_mode: $AUTH_MODE" >&2
                exit 1
                ;;
            esac
          fi

          if [ -z "$TOKEN" ]; then
            echo "Resolved token is empty" >&2
            exit 1
          fi

          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Check linked open PRs and reopen if needed
        uses: actions/github-script@v8
        env:
          PROJECT_OWNER: ${{ inputs.project_owner }}
          BACKLOG_REPO: ${{ inputs.backlog_repo }}
          ISSUE_NUMBER: ${{ inputs.issue_number || github.event.issue.number }}
        with:
          github-token: ${{ steps.auth.outputs.token }}
          script: |
            const projectOwner = process.env.PROJECT_OWNER;
            const backlogRepo = process.env.BACKLOG_REPO;
            const issueNumber = Number(process.env.ISSUE_NUMBER);

            if (!Number.isInteger(issueNumber) || issueNumber <= 0) {
              throw new Error('A valid issue_number input or github.event.issue.number is required.');
            }

            const ISSUE_TIMELINE_QUERY = `
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  issue(number: $number) {
                    timelineItems(itemTypes: [CROSS_REFERENCED_EVENT], first: 100) {
                      nodes {
                        ... on CrossReferencedEvent {
                          source {
                            __typename
                            ... on PullRequest {
                              number
                              state
                              title
                              body
                              repository {
                                nameWithOwner
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            function escapeRegExp(value) {
              return value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            }

            const data = await github.graphql(ISSUE_TIMELINE_QUERY, {
              owner: projectOwner,
              repo: backlogRepo,
              number: issueNumber,
            });

            const timelineNodes = data.repository?.issue?.timelineItems?.nodes ?? [];
            const targetRef = `${projectOwner}/${backlogRepo}#${issueNumber}`;
            const closingPattern = new RegExp(`\\b(?:closes|fixes|resolves)\\s+${escapeRegExp(targetRef)}\\b`, 'i');

            const openPullRequests = timelineNodes
              .map((node) => node?.source)
              .filter((source) => source?.__typename === 'PullRequest')
              .filter((pullRequest) => pullRequest.state === 'OPEN')
              .filter((pullRequest) => closingPattern.test(pullRequest.body || ''));

            if (openPullRequests.length === 0) {
              core.info('No open linked PRs with closing keywords. Issue stays closed.');
              return;
            }

            const pullRequestLines = openPullRequests.map((pullRequest) =>
              `- ${pullRequest.repository.nameWithOwner}#${pullRequest.number} — ${pullRequest.title}`,
            );

            core.info(`Open linked PRs found:\n${pullRequestLines.join('\n')}`);

            await github.request('PATCH /repos/{owner}/{repo}/issues/{issue_number}', {
              owner: projectOwner,
              repo: backlogRepo,
              issue_number: issueNumber,
              state: 'open',
            });

            const body = [
              '🔁 **Issue переоткрыта автоматически.**',
              '',
              'К ней привязаны открытые PR:',
              '',
              ...pullRequestLines,
              '',
              'Чтобы закрыть Issue, выберите один из вариантов для каждого PR:',
              '1. **Мёрдж PR** — Issue закроется сама через `Closes`.',
              '2. **Закрыть PR без мёрджа** — Issue больше не будет переоткрываться из-за него.',
              `3. **Отвязать PR от Issue** — уберите строку \`Closes ${targetRef}\` из тела PR, затем закройте Issue вручную.`,
            ].join('\n');

            await github.request('POST /repos/{owner}/{repo}/issues/{issue_number}/comments', {
              owner: projectOwner,
              repo: backlogRepo,
              issue_number: issueNumber,
              body,
            });

            core.info(`Issue #${issueNumber} was reopened and commented successfully.`);
