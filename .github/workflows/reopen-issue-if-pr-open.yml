name: Reopen issue if linked PRs are open

on:
  workflow_call:
    inputs:
      project_owner:
        description: Organization or user login that owns the backlog repository
        required: true
        type: string
      backlog_repo:
        description: Repository name where backlog issues live
        required: true
        type: string
    secrets:
      project_token:
        required: true

jobs:
  check-and-reopen:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: read

    steps:
      - name: Check linked open PRs and reopen if needed
        uses: actions/github-script@v8
        env:
          PROJECT_OWNER: ${{ inputs.project_owner }}
          BACKLOG_REPO: ${{ inputs.backlog_repo }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        with:
          github-token: ${{ secrets.project_token }}
          script: |
            const projectOwner = process.env.PROJECT_OWNER;
            const backlogRepo = process.env.BACKLOG_REPO;
            const issueNumber = Number(process.env.ISSUE_NUMBER);

            const ISSUE_TIMELINE_QUERY = `
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  issue(number: $number) {
                    timelineItems(itemTypes: [CROSS_REFERENCED_EVENT], first: 100) {
                      nodes {
                        ... on CrossReferencedEvent {
                          source {
                            __typename
                            ... on PullRequest {
                              number
                              state
                              title
                              body
                              repository {
                                nameWithOwner
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            function escapeRegExp(value) {
              return value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            }

            const data = await github.graphql(ISSUE_TIMELINE_QUERY, {
              owner: projectOwner,
              repo: backlogRepo,
              number: issueNumber,
            });

            const timelineNodes = data.repository?.issue?.timelineItems?.nodes ?? [];
            const targetRef = `${projectOwner}/${backlogRepo}#${issueNumber}`;
            const closingPattern = new RegExp(`\\b(?:closes|fixes|resolves)\\s+${escapeRegExp(targetRef)}\\b`, 'i');

            const openPullRequests = timelineNodes
              .map((node) => node?.source)
              .filter((source) => source?.__typename === 'PullRequest')
              .filter((pullRequest) => pullRequest.state === 'OPEN')
              .filter((pullRequest) => closingPattern.test(pullRequest.body || ''));

            if (openPullRequests.length === 0) {
              core.info('No open linked PRs with closing keywords. Issue stays closed.');
              return;
            }

            const pullRequestLines = openPullRequests.map((pullRequest) =>
              `- ${pullRequest.repository.nameWithOwner}#${pullRequest.number} — ${pullRequest.title}`,
            );

            core.info(`Open linked PRs found:\n${pullRequestLines.join('\n')}`);

            await github.request('PATCH /repos/{owner}/{repo}/issues/{issue_number}', {
              owner: projectOwner,
              repo: backlogRepo,
              issue_number: issueNumber,
              state: 'open',
            });

            const body = [
              '🔁 **Issue переоткрыта автоматически.**',
              '',
              'К ней привязаны открытые PR:',
              '',
              ...pullRequestLines,
              '',
              'Чтобы закрыть Issue, выберите один из вариантов для каждого PR:',
              '1. **Мёрдж PR** — Issue закроется сама через `Closes`.',
              '2. **Закрыть PR без мёрджа** — Issue больше не будет переоткрываться из-за него.',
              `3. **Отвязать PR от Issue** — уберите строку \`Closes ${targetRef}\` из тела PR, затем закройте Issue вручную.`,
            ].join('\n');

            await github.request('POST /repos/{owner}/{repo}/issues/{issue_number}/comments', {
              owner: projectOwner,
              repo: backlogRepo,
              issue_number: issueNumber,
              body,
            });

            core.info(`Issue #${issueNumber} was reopened and commented successfully.`);
