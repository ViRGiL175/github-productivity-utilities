name: Copilot Generate Text

on:
  workflow_call:
    inputs:
      prompt_text:
        description: Main instruction for the model
        required: true
        type: string
      input_text:
        description: Optional additional input appended after the prompt
        required: false
        default: ''
        type: string
      context_files:
        description: Newline-separated list of file paths whose contents are appended to input_text as additional context
        required: false
        default: ''
        type: string
      model:
        description: Copilot model ID to use (e.g. gpt-4.1, gpt-5-mini, claude-sonnet-4.6)
        required: false
        default: 'gpt-4.1'
        type: string
    outputs:
      text:
        description: Generated text result
        value: ${{ jobs.generate.outputs.text }}
    secrets:
      copilot_token:
        required: true

permissions:
  contents: read

jobs:
  generate:
    name: Generate text via Copilot SDK
    runs-on: ubuntu-latest
    outputs:
      text: ${{ steps.generate.outputs.text }}
    steps:
      - name: Checkout caller repository
        if: inputs.context_files != ''
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6

      - name: Install Copilot SDK runtime dependencies
        run: npm_config_ignore_scripts=false npm install @github/copilot-sdk@0.2.1 --no-audit --no-fund

      - name: Read context files
        id: context
        if: inputs.context_files != ''
        uses: actions/github-script@v8
        env:
          CONTEXT_FILES: ${{ inputs.context_files }}
        with:
          script: |
            const fs = require('fs');
            const MAX_CONTEXT_BYTES = 50_000;
            const paths = (process.env.CONTEXT_FILES || '').split('\n').map(p => p.trim()).filter(Boolean);
            let totalBytes = 0;
            const parts = [];
            for (const filepath of paths) {
              if (!fs.existsSync(filepath)) {
                core.error(`Context file not found: ${filepath}`);
                process.exit(1);
              }
              const bytes = fs.statSync(filepath).size;
              if (totalBytes + bytes > MAX_CONTEXT_BYTES) {
                core.error(`Combined context files exceed ${MAX_CONTEXT_BYTES} bytes. Reduce the number or size of context_files.`);
                process.exit(1);
              }
              parts.push(fs.readFileSync(filepath, 'utf8'));
              totalBytes += bytes;
            }
            core.setOutput('content', parts.join('\n\n'));

      - name: Generate text
        id: generate
        uses: actions/github-script@v8
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.copilot_token }}
          PROMPT_TEXT: ${{ inputs.prompt_text }}
          INPUT_TEXT: ${{ inputs.input_text }}
          CONTEXT_FILES_CONTENT: ${{ steps.context.outputs.content }}
          MODEL: ${{ inputs.model }}
        with:
          script: |
            const { pathToFileURL } = require('node:url');

            // github-script wraps `require` in a proxy that lacks `.resolve`.
            // `__original_require__` is the real Node.js require — needed to locate
            // the ESM package path. The SDK itself is ESM-only, so we use `import()`.
            const sdkEntry = __original_require__.resolve('@github/copilot-sdk', { paths: [process.cwd()] });
            const { CopilotClient } = await import(pathToFileURL(sdkEntry).href);

            // Deny all permission requests — plain text generation requires none.
            // If a request arrives, it signals unexpected model behaviour and should fail loudly.
            const denyAll = () => ({ kind: 'denied-by-permission-request-hook' });

            const promptText = process.env.PROMPT_TEXT || '';
            const inputText = process.env.INPUT_TEXT || '';
            const contextFilesContent = process.env.CONTEXT_FILES_CONTENT || '';
            const model = process.env.MODEL || '';

            const effectiveInput = contextFilesContent
              ? (inputText ? `${inputText}\n\n${contextFilesContent}` : contextFilesContent)
              : inputText;

            if (!promptText.trim()) {
              throw new Error('prompt_text must not be empty');
            }

            const client = new CopilotClient({
              githubToken: process.env.COPILOT_GITHUB_TOKEN,
            });

            try {
              await client.start();

              const sessionConfig = {
                onPermissionRequest: denyAll,
                model,
                systemMessage: {
                  mode: 'replace',
                  content: promptText,
                },
              };

              const session = await client.createSession(sessionConfig);

              try {
                const response = await session.sendAndWait({ prompt: effectiveInput || promptText });
                const content = (response?.data?.content || '').trim();

                core.debug(`Raw response data: ${JSON.stringify(response?.data)}`);
                core.debug(`Trimmed content (${content.length} chars): ${JSON.stringify(content)}`);

                if (!content) {
                  throw new Error('Copilot SDK returned an empty response');
                }

                core.setOutput('text', content);
              } finally {
                await session.disconnect();
              }
            } finally {
              await client.stop();
            }
