# Назначение: собирает краткий контекст по ссылкам на issue, PR, релизы и коммиты из произвольного текста.
# Когда использовать: как reusable workflow перед генерацией текста или triage, когда нужно подтянуть связанные материалы по GitHub-ссылкам.
name: Collect Linked Context

on:
  workflow_call:
    inputs:
      text:
        description: Text to scan for GitHub links (e.g. PR body)
        required: true
        type: string
      auth_mode:
        description: Auth mode used to resolve a token when token is not provided directly (pat or app)
        required: false
        default: pat
        type: string
      installation_owner:
        description: Installation owner used to mint a GitHub App token when auth_mode=app
        required: false
        type: string
    secrets:
      token:
        description: Direct token override; takes precedence over auth_mode resolution
        required: false
      pat_token:
        description: PAT used when auth_mode=pat
        required: false
      app_id:
        description: GitHub App ID used when auth_mode=app
        required: false
      app_private_key:
        description: GitHub App private key used when auth_mode=app
        required: false
    outputs:
      value:
        description: Formatted linked context text, or empty string if nothing found
        value: ${{ jobs.collect.outputs.value }}

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  collect:
    name: Collect linked PRs, Issues, Releases, Commits
    runs-on: ubuntu-latest
    outputs:
      value: ${{ steps.collect.outputs.value }}
    env:
      AUTH_MODE: ${{ inputs.auth_mode }}
      INSTALLATION_OWNER: ${{ inputs.installation_owner }}
      DIRECT_TOKEN: ${{ secrets.token }}
      PAT_TOKEN: ${{ secrets.pat_token }}
      APP_ID: ${{ secrets.app_id }}
      APP_PRIVATE_KEY: ${{ secrets.app_private_key }}
    steps:
      - name: Validate workflow auth configuration
        shell: bash
        run: |
          if [ -n "$DIRECT_TOKEN" ]; then
            exit 0
          fi

          case "$AUTH_MODE" in
            pat)
              if [ -z "$PAT_TOKEN" ]; then
                echo "pat_token secret is required when auth_mode=pat and token is not provided" >&2
                exit 1
              fi
              ;;
            app)
              if [ -z "$APP_ID" ] || [ -z "$APP_PRIVATE_KEY" ] || [ -z "$INSTALLATION_OWNER" ]; then
                echo "app_id, app_private_key, and installation_owner are required when auth_mode=app and token is not provided" >&2
                exit 1
              fi
              ;;
            *)
              echo "Unsupported auth_mode: $AUTH_MODE" >&2
              exit 1
              ;;
          esac

      - name: Normalize GitHub App private key
        if: ${{ env.DIRECT_TOKEN == '' && env.AUTH_MODE == 'app' }}
        id: normalize-key
        shell: bash
        run: |
          if [[ "$APP_PRIVATE_KEY" == *'\n'* ]]; then
            printf 'private_key<<EOF\n%b\nEOF\n' "$APP_PRIVATE_KEY" >> "$GITHUB_OUTPUT"
          else
            printf 'private_key<<EOF\n%s\nEOF\n' "$APP_PRIVATE_KEY" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub App installation token
        if: ${{ env.DIRECT_TOKEN == '' && env.AUTH_MODE == 'app' }}
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.app_id }}
          private-key: ${{ steps.normalize-key.outputs.private_key }}
          owner: ${{ inputs.installation_owner }}
          skip-token-revoke: true

      - name: Resolve workflow auth token
        id: auth
        shell: bash
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [ -n "$DIRECT_TOKEN" ]; then
            TOKEN="$DIRECT_TOKEN"
          else
            case "$AUTH_MODE" in
              pat)
                TOKEN="$PAT_TOKEN"
                ;;
              app)
                TOKEN="$APP_TOKEN"
                ;;
              *)
                echo "Unsupported auth_mode: $AUTH_MODE" >&2
                exit 1
                ;;
            esac
          fi

          if [ -z "$TOKEN" ]; then
            echo "Resolved token is empty" >&2
            exit 1
          fi

          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Collect linked context
        id: collect
        uses: actions/github-script@v8
        env:
          INPUT_TEXT: ${{ inputs.text }}
        with:
          github-token: ${{ steps.auth.outputs.token }}
          script: |
            const MAX_ITEMS = 5;
            const MAX_BODY_CHARS = 800;
            const text = process.env.INPUT_TEXT ?? '';
            const defaultOwner = context.repo.owner;
            const defaultRepo = context.repo.repo;

            // Shared fetch+format logic per item type.
            // New item types can be added here without touching LINK_TYPES below.
            const ITEM_HANDLERS = {
              issue: {
                fetch: async (r) => {
                  const { data } = await github.rest.issues.get({
                    owner: r.owner, repo: r.repo, issue_number: r.number
                  });
                  return data;
                },
                format: (r, data) => {
                  const kind = data.pull_request ? 'PR' : 'Issue';
                  const body = (data.body ?? '').slice(0, MAX_BODY_CHARS);
                  return `${kind} ${r.owner}/${r.repo}#${r.number} («${data.title}»):\n${body}`;
                },
              },
              release: {
                fetch: async (r) => {
                  const { data } = await github.rest.repos.getReleaseByTag({
                    owner: r.owner, repo: r.repo, tag: r.tag
                  });
                  return data;
                },
                format: (r, data) => {
                  const body = (data.body ?? '').slice(0, MAX_BODY_CHARS);
                  return `Релиз ${r.owner}/${r.repo}@${r.tag} («${data.name ?? r.tag}»):\n${body}`;
                },
              },
              commit: {
                fetch: async (r) => {
                  const { data } = await github.rest.repos.getCommit({
                    owner: r.owner, repo: r.repo, ref: r.sha
                  });
                  return data;
                },
                format: (r, data) => {
                  const msg = (data.commit.message ?? '').slice(0, MAX_BODY_CHARS);
                  return `Коммит ${r.sha.slice(0, 7)} (${r.owner}/${r.repo}):\n${msg}`;
                },
              },
            };

            // Registry of link syntaxes GitHub supports.
            // Each entry: { name, pattern, ref(match) → ref-object, key(ref) → dedup-string }
            // Entries sharing the same key() output are deduplicated — first match wins.
            const LINK_TYPES = [
              {
                // Full URL: https://github.com/owner/repo/pull/123
                //           https://github.com/owner/repo/issues/123
                //           https://redirect.github.com/... (Dependabot changelog links)
                name: 'github-pr-issue-url',
                pattern: /https:\/\/(?:redirect\.)?github\.com\/([^/\s"'<>]+)\/([^/\s"'<>]+)\/(?:pull|issues)\/(\d+)/g,
                ref: (m) => ({ type: 'issue', owner: m[1], repo: m[2], number: parseInt(m[3], 10) }),
                key: (r) => `issue:${r.owner}/${r.repo}#${r.number}`,
              },
              {
                // Short reference: #123 (same repo as caller)
                // Matches #NUM at line start or after space / , ( :
                name: 'short-ref',
                pattern: /(?:^|[\s,(:])#(\d+)/gm,
                ref: (m) => ({ type: 'issue', owner: defaultOwner, repo: defaultRepo, number: parseInt(m[1], 10) }),
                key: (r) => `issue:${r.owner}/${r.repo}#${r.number}`,
              },
              {
                // Cross-repo reference: owner/repo#123
                // Negative lookbehind prevents matching path segments like github.com/owner/repo
                name: 'cross-repo-ref',
                pattern: /(?<![/\w])([A-Za-z0-9](?:[A-Za-z0-9_.-]*[A-Za-z0-9])?)\/([A-Za-z0-9](?:[A-Za-z0-9_.-]*[A-Za-z0-9])?)#(\d+)/g,
                ref: (m) => ({ type: 'issue', owner: m[1], repo: m[2], number: parseInt(m[3], 10) }),
                key: (r) => `issue:${r.owner}/${r.repo}#${r.number}`,
              },
              {
                // GitHub release tag URL: https://github.com/owner/repo/releases/tag/v1.2.3
                name: 'github-release-url',
                pattern: /https:\/\/github\.com\/([^/\s"'<>]+)\/([^/\s"'<>]+)\/releases\/tag\/([^\s"'<>)]+)/g,
                ref: (m) => ({ type: 'release', owner: m[1], repo: m[2], tag: m[3] }),
                key: (r) => `release:${r.owner}/${r.repo}@${r.tag}`,
              },
              {
                // GitHub commit URL: https://github.com/owner/repo/commit/abc1234
                name: 'github-commit-url',
                pattern: /https:\/\/github\.com\/([^/\s"'<>]+)\/([^/\s"'<>]+)\/commit\/([0-9a-f]{7,40})\b/gi,
                ref: (m) => ({ type: 'commit', owner: m[1], repo: m[2], sha: m[3] }),
                key: (r) => `commit:${r.owner}/${r.repo}@${r.sha}`,
              },
            ];

            // --- Pass 1: collect unique refs across all link types ---
            const seen = new Map(); // key → { ref, handler }
            for (const lt of LINK_TYPES) {
              lt.pattern.lastIndex = 0;
              let m;
              while ((m = lt.pattern.exec(text)) !== null) {
                const ref = lt.ref(m);
                const key = lt.key(ref);
                if (!seen.has(key)) {
                  seen.set(key, { ref, handler: ITEM_HANDLERS[ref.type] });
                  core.info(`[${lt.name}] found: ${key}`);
                }
              }
            }
            core.info(`Total unique references: ${seen.size}`);

            if (seen.size === 0) {
              core.setOutput('value', '');
              return;
            }

            // --- Pass 2: fetch and format, up to MAX_ITEMS ---
            const results = [];
            for (const [key, { ref, handler }] of [...seen.entries()].slice(0, MAX_ITEMS)) {
              try {
                core.info(`Fetching: ${key}`);
                const data = await handler.fetch(ref);
                results.push(handler.format(ref, data));
                core.info(`OK: ${key}`);
              } catch (err) {
                core.warning(`Skipped ${key}: ${err.message}`);
              }
            }

            if (results.length === 0) {
              core.setOutput('value', '');
            } else {
              core.setOutput('value', `Связанные материалы:\n\n${results.join('\n\n---\n\n')}`);
            }
