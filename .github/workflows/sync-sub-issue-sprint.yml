name: Sync sub-issue sprint from parent

on:
  workflow_call:
    inputs:
      project_owner:
        description: Login of the organization or user that owns the Project V2 board
        required: true
        type: string
      project_number:
        description: Project V2 number
        required: true
        type: number
      iteration_field_name:
        description: Name of the iteration field to copy from parent to sub-issue
        required: false
        default: Sprint
        type: string
    secrets:
      project_token:
        required: true

permissions:
  contents: read

jobs:
  sync-sub-issue-sprint:
    name: Inherit sprint from parent issue
    if: ${{ github.event.action == 'opened' && github.event.issue && !github.event.issue.pull_request }}
    runs-on: ubuntu-latest
    env:
      PROJECT_OWNER: ${{ inputs.project_owner }}
      PROJECT_NUMBER: ${{ inputs.project_number }}
      ITERATION_FIELD_NAME: ${{ inputs.iteration_field_name }}

    steps:
      - name: Copy sprint from parent issue
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.project_token }}
          script: |
            const core = require('@actions/core');

            const projectOwner = process.env.PROJECT_OWNER;
            const projectNumber = Number(process.env.PROJECT_NUMBER);
            const iterationFieldName = process.env.ITERATION_FIELD_NAME;

            const issue = context.payload.issue;
            const repoOwner = context.repo.owner;
            const repoName = context.repo.repo;

            const ORGANIZATION_PROJECT_QUERY = `
              query($owner: String!, $number: Int!) {
                organization(login: $owner) {
                  projectV2(number: $number) {
                    id
                    fields(first: 50) {
                      nodes {
                        ... on ProjectV2IterationField {
                          id
                          name
                        }
                      }
                    }
                  }
                }
              }
            `;

            const USER_PROJECT_QUERY = `
              query($owner: String!, $number: Int!) {
                user(login: $owner) {
                  projectV2(number: $number) {
                    id
                    fields(first: 50) {
                      nodes {
                        ... on ProjectV2IterationField {
                          id
                          name
                        }
                      }
                    }
                  }
                }
              }
            `;

            const ISSUE_PROJECT_ITEMS_QUERY = `
              query($issueId: ID!, $fieldName: String!) {
                node(id: $issueId) {
                  ... on Issue {
                    projectItems(first: 100) {
                      nodes {
                        id
                        project {
                          id
                        }
                        fieldValueByName(name: $fieldName) {
                          ... on ProjectV2ItemFieldIterationValue {
                            iterationId
                            title
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const ADD_ISSUE_TO_PROJECT_MUTATION = `
              mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                  item {
                    id
                  }
                }
              }
            `;

            const SET_ITERATION_MUTATION = `
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $iterationId: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId
                  itemId: $itemId
                  fieldId: $fieldId
                  value: { iterationId: $iterationId }
                }) {
                  projectV2Item {
                    id
                  }
                }
              }
            `;

            function parseRepoFromUrl(repositoryUrl) {
              const url = new URL(repositoryUrl);
              const parts = url.pathname.split('/').filter(Boolean);

              if (parts[0] === 'repos' && parts.length >= 3) {
                return { owner: parts[1], repo: parts[2] };
              }

              if (parts.length >= 2) {
                return { owner: parts[0], repo: parts[1] };
              }

              throw new Error(`Could not parse repository URL: ${repositoryUrl}`);
            }

            async function getProjectOwnerType(ownerLogin) {
              const response = await github.request('GET /users/{username}', {
                username: ownerLogin,
                headers: {
                  accept: 'application/vnd.github+json',
                  'X-GitHub-Api-Version': '2022-11-28',
                },
              });

              return response.data.type;
            }

            async function getProjectMetadata(ownerLogin, number, fieldName) {
              const ownerType = await getProjectOwnerType(ownerLogin);
              const isOrganization = ownerType === 'Organization';
              const isUser = ownerType === 'User';

              if (!isOrganization && !isUser) {
                throw new Error(`Unsupported project owner type "${ownerType}" for ${ownerLogin}.`);
              }

              const query = isOrganization ? ORGANIZATION_PROJECT_QUERY : USER_PROJECT_QUERY;
              const data = await github.graphql(query, {
                owner: ownerLogin,
                number,
              });

              const project = isOrganization
                ? data.organization?.projectV2
                : data.user?.projectV2;

              if (!project) {
                throw new Error(`Project V2 #${number} was not found for owner ${ownerLogin}.`);
              }

              const iterationField = project.fields.nodes.find((field) => field?.name === fieldName);
              if (!iterationField) {
                throw new Error(`Iteration field "${fieldName}" was not found in project ${ownerLogin}#${number}.`);
              }

              return {
                projectId: project.id,
                iterationFieldId: iterationField.id,
              };
            }

            async function getIssueProjectItem(issueNodeId, projectId, fieldName) {
              const data = await github.graphql(ISSUE_PROJECT_ITEMS_QUERY, {
                issueId: issueNodeId,
                fieldName,
              });

              return data.node?.projectItems?.nodes?.find((item) => item.project?.id === projectId) ?? null;
            }

            async function addIssueToProject(projectId, issueNodeId) {
              const data = await github.graphql(ADD_ISSUE_TO_PROJECT_MUTATION, {
                projectId,
                contentId: issueNodeId,
              });

              return data.addProjectV2ItemById.item.id;
            }

            async function setIteration(projectId, itemId, fieldId, iterationId) {
              await github.graphql(SET_ITERATION_MUTATION, {
                projectId,
                itemId,
                fieldId,
                iterationId,
              });
            }

            let parentIssue;
            try {
              const response = await github.request('GET /repos/{owner}/{repo}/issues/{issue_number}/parent', {
                owner: repoOwner,
                repo: repoName,
                issue_number: issue.number,
                headers: {
                  accept: 'application/vnd.github+json',
                  'X-GitHub-Api-Version': '2022-11-28',
                },
              });
              parentIssue = response.data;
            } catch (error) {
              if (error.status === 404) {
                core.info(`Issue #${issue.number} has no parent issue. Nothing to sync.`);
                return;
              }
              throw error;
            }

            const { owner: parentOwner, repo: parentRepo } = parseRepoFromUrl(parentIssue.repository_url);
            core.info(`Found parent issue ${parentOwner}/${parentRepo}#${parentIssue.number}.`);

            const { projectId, iterationFieldId } = await getProjectMetadata(projectOwner, projectNumber, iterationFieldName);
            const parentProjectItem = await getIssueProjectItem(parentIssue.node_id, projectId, iterationFieldName);

            if (!parentProjectItem) {
              core.info(`Parent issue ${parentOwner}/${parentRepo}#${parentIssue.number} is not in project ${projectOwner}#${projectNumber}.`);
              return;
            }

            const parentIterationId = parentProjectItem.fieldValueByName?.iterationId;
            const parentIterationTitle = parentProjectItem.fieldValueByName?.title ?? '';

            if (!parentIterationId) {
              core.info(`Parent issue ${parentOwner}/${parentRepo}#${parentIssue.number} has no value in field ${iterationFieldName}.`);
              return;
            }

            const subIssueProjectItem = await getIssueProjectItem(issue.node_id, projectId, iterationFieldName);
            let subIssueItemId = subIssueProjectItem?.id;
            const currentIterationId = subIssueProjectItem?.fieldValueByName?.iterationId ?? null;

            if (!subIssueItemId) {
              core.info(`Sub-issue #${issue.number} is not in project yet. Adding it now.`);
              subIssueItemId = await addIssueToProject(projectId, issue.node_id);
            }

            if (currentIterationId === parentIterationId) {
              core.info(`Sub-issue #${issue.number} already has sprint ${parentIterationTitle || parentIterationId}.`);
              return;
            }

            await setIteration(projectId, subIssueItemId, iterationFieldId, parentIterationId);
            core.info(`Copied sprint ${parentIterationTitle || parentIterationId} from parent issue to sub-issue #${issue.number}.`);
