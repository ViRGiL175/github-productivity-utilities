# Назначение: копирует sprint/iteration родительской issue в sub-issue и при необходимости добавляет sub-issue в проект.
# Когда использовать: как reusable workflow на событии создания sub-issue, чтобы дочерние задачи наследовали спринт родителя.
name: Sync sub-issue sprint from parent

on:
  workflow_call:
    inputs:
      project_owner:
        description: Login of the organization or user that owns the Project V2 board
        required: true
        type: string
      project_number:
        description: Project V2 number
        required: true
        type: number
      iteration_field_name:
        description: Name of the iteration field to copy from parent to sub-issue
        required: false
        default: Sprint
        type: string
      issue_number:
        description: Issue number override; falls back to github.event.issue.number when omitted
        required: false
        type: string
      repo_owner:
        description: Repository owner override; falls back to context.repo.owner when omitted
        required: false
        type: string
      repo_name:
        description: Repository name override; falls back to context.repo.repo when omitted
        required: false
        type: string
      action:
        description: Action override; falls back to github.event.action when omitted
        required: false
        type: string
      auth_mode:
        description: Auth mode used to resolve a token when project_token is not provided
        required: false
        default: pat
        type: string
      installation_owner:
        description: Installation owner used to mint a GitHub App token when auth_mode=app
        required: false
        type: string
    secrets:
      project_token:
        required: false
      pat_token:
        required: false
      app_id:
        required: false
      app_private_key:
        required: false

permissions:
  contents: read

jobs:
  sync-sub-issue-sprint:
    name: Inherit sprint from parent issue
    runs-on: ubuntu-latest
    env:
      AUTH_MODE: ${{ inputs.auth_mode }}
      INSTALLATION_OWNER: ${{ inputs.installation_owner }}
      DIRECT_TOKEN: ${{ secrets.project_token }}
      PAT_TOKEN: ${{ secrets.pat_token }}
      APP_ID: ${{ secrets.app_id }}
      APP_PRIVATE_KEY: ${{ secrets.app_private_key }}
      PROJECT_OWNER: ${{ inputs.project_owner }}
      PROJECT_NUMBER: ${{ inputs.project_number }}
      ITERATION_FIELD_NAME: ${{ inputs.iteration_field_name }}
      ISSUE_NUMBER: ${{ inputs.issue_number }}
      REPO_OWNER: ${{ inputs.repo_owner }}
      REPO_NAME: ${{ inputs.repo_name }}
      ACTION: ${{ inputs.action }}

    steps:
      - name: Validate workflow auth configuration
        shell: bash
        run: |
          if [ -n "$DIRECT_TOKEN" ]; then
            exit 0
          fi

          case "$AUTH_MODE" in
            pat)
              if [ -z "$PAT_TOKEN" ]; then
                echo "pat_token secret is required when auth_mode=pat and project_token is not provided" >&2
                exit 1
              fi
              ;;
            app)
              if [ -z "$APP_ID" ] || [ -z "$APP_PRIVATE_KEY" ] || [ -z "$INSTALLATION_OWNER" ]; then
                echo "app_id, app_private_key, and installation_owner are required when auth_mode=app and project_token is not provided" >&2
                exit 1
              fi
              ;;
            *)
              echo "Unsupported auth_mode: $AUTH_MODE" >&2
              exit 1
              ;;
          esac

      - name: Normalize GitHub App private key
        if: ${{ env.DIRECT_TOKEN == '' && env.AUTH_MODE == 'app' }}
        id: normalize-key
        shell: bash
        run: |
          if [[ "$APP_PRIVATE_KEY" == *'\n'* ]]; then
            printf 'private_key<<EOF\n%b\nEOF\n' "$APP_PRIVATE_KEY" >> "$GITHUB_OUTPUT"
          else
            printf 'private_key<<EOF\n%s\nEOF\n' "$APP_PRIVATE_KEY" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub App installation token
        if: ${{ env.DIRECT_TOKEN == '' && env.AUTH_MODE == 'app' }}
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.app_id }}
          private-key: ${{ steps.normalize-key.outputs.private_key }}
          owner: ${{ inputs.installation_owner }}
          skip-token-revoke: true

      - name: Resolve workflow auth token
        id: auth
        shell: bash
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [ -n "$DIRECT_TOKEN" ]; then
            TOKEN="$DIRECT_TOKEN"
          else
            case "$AUTH_MODE" in
              pat)
                TOKEN="$PAT_TOKEN"
                ;;
              app)
                TOKEN="$APP_TOKEN"
                ;;
              *)
                echo "Unsupported auth_mode: $AUTH_MODE" >&2
                exit 1
                ;;
            esac
          fi

          if [ -z "$TOKEN" ]; then
            echo "Resolved token is empty" >&2
            exit 1
          fi

          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Copy sprint from parent issue
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.auth.outputs.token }}
          script: |
            const projectOwner = process.env.PROJECT_OWNER;
            const projectNumber = Number(process.env.PROJECT_NUMBER);
            const iterationFieldName = process.env.ITERATION_FIELD_NAME;
            const issueNumber = Number(process.env.ISSUE_NUMBER || context.payload.issue?.number || '');
            const repoOwner = process.env.REPO_OWNER || context.repo.owner;
            const repoName = process.env.REPO_NAME || context.repo.repo;
            const action = process.env.ACTION || context.payload.action || 'opened';

            const ORGANIZATION_PROJECT_QUERY = `
              query($owner: String!, $number: Int!) {
                organization(login: $owner) {
                  projectV2(number: $number) {
                    id
                    fields(first: 50) {
                      nodes {
                        ... on ProjectV2IterationField {
                          id
                          name
                        }
                      }
                    }
                  }
                }
              }
            `;

            const USER_PROJECT_QUERY = `
              query($owner: String!, $number: Int!) {
                user(login: $owner) {
                  projectV2(number: $number) {
                    id
                    fields(first: 50) {
                      nodes {
                        ... on ProjectV2IterationField {
                          id
                          name
                        }
                      }
                    }
                  }
                }
              }
            `;

            const ISSUE_PROJECT_ITEMS_QUERY = `
              query($issueId: ID!, $fieldName: String!) {
                node(id: $issueId) {
                  ... on Issue {
                    projectItems(first: 100) {
                      nodes {
                        id
                        project {
                          id
                        }
                        fieldValueByName(name: $fieldName) {
                          ... on ProjectV2ItemFieldIterationValue {
                            iterationId
                            title
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const ADD_ISSUE_TO_PROJECT_MUTATION = `
              mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                  item {
                    id
                  }
                }
              }
            `;

            const SET_ITERATION_MUTATION = `
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $iterationId: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId
                  itemId: $itemId
                  fieldId: $fieldId
                  value: { iterationId: $iterationId }
                }) {
                  projectV2Item {
                    id
                  }
                }
              }
            `;

            function parseRepoFromUrl(repositoryUrl) {
              const url = new URL(repositoryUrl);
              const parts = url.pathname.split('/').filter(Boolean);

              if (parts[0] === 'repos' && parts.length >= 3) {
                return { owner: parts[1], repo: parts[2] };
              }

              if (parts.length >= 2) {
                return { owner: parts[0], repo: parts[1] };
              }

              throw new Error(`Could not parse repository URL: ${repositoryUrl}`);
            }

            async function getProjectOwnerType(ownerLogin) {
              const response = await github.request('GET /users/{username}', {
                username: ownerLogin,
                headers: {
                  accept: 'application/vnd.github+json',
                  'X-GitHub-Api-Version': '2022-11-28',
                },
              });

              return response.data.type;
            }

            async function getProjectMetadata(ownerLogin, number, fieldName) {
              const ownerType = await getProjectOwnerType(ownerLogin);
              const isOrganization = ownerType === 'Organization';
              const isUser = ownerType === 'User';

              if (!isOrganization && !isUser) {
                throw new Error(`Unsupported project owner type "${ownerType}" for ${ownerLogin}.`);
              }

              const query = isOrganization ? ORGANIZATION_PROJECT_QUERY : USER_PROJECT_QUERY;
              const data = await github.graphql(query, {
                owner: ownerLogin,
                number,
              });

              const project = isOrganization
                ? data.organization?.projectV2
                : data.user?.projectV2;

              if (!project) {
                throw new Error(`Project V2 #${number} was not found for owner ${ownerLogin}.`);
              }

              const iterationField = project.fields.nodes.find((field) => field?.name === fieldName);
              if (!iterationField) {
                throw new Error(`Iteration field "${fieldName}" was not found in project ${ownerLogin}#${number}.`);
              }

              return {
                projectId: project.id,
                iterationFieldId: iterationField.id,
              };
            }

            async function getIssueProjectItem(issueNodeId, projectId, fieldName) {
              const data = await github.graphql(ISSUE_PROJECT_ITEMS_QUERY, {
                issueId: issueNodeId,
                fieldName,
              });

              return data.node?.projectItems?.nodes?.find((item) => item.project?.id === projectId) ?? null;
            }

            async function addIssueToProject(projectId, issueNodeId) {
              const data = await github.graphql(ADD_ISSUE_TO_PROJECT_MUTATION, {
                projectId,
                contentId: issueNodeId,
              });

              return data.addProjectV2ItemById.item.id;
            }

            async function setIteration(projectId, itemId, fieldId, iterationId) {
              await github.graphql(SET_ITERATION_MUTATION, {
                projectId,
                itemId,
                fieldId,
                iterationId,
              });
            }

            if (action !== 'opened') {
              core.info(`Action is "${action}", so sprint sync is skipped.`);
              return;
            }

            if (!Number.isInteger(issueNumber) || issueNumber <= 0) {
              throw new Error('A valid issue_number input or github.event.issue.number is required.');
            }

            const issueResponse = await github.request('GET /repos/{owner}/{repo}/issues/{issue_number}', {
              owner: repoOwner,
              repo: repoName,
              issue_number: issueNumber,
              headers: {
                accept: 'application/vnd.github+json',
                'X-GitHub-Api-Version': '2022-11-28',
              },
            });

            const issue = issueResponse.data;

            if (issue.pull_request) {
              core.info(`Issue #${issue.number} is a pull request. Nothing to sync.`);
              return;
            }

            let parentIssue;
            try {
              const response = await github.request('GET /repos/{owner}/{repo}/issues/{issue_number}/parent', {
                owner: repoOwner,
                repo: repoName,
                issue_number: issue.number,
                headers: {
                  accept: 'application/vnd.github+json',
                  'X-GitHub-Api-Version': '2022-11-28',
                },
              });
              parentIssue = response.data;
            } catch (error) {
              if (error.status === 404) {
                core.info(`Issue #${issue.number} has no parent issue. Nothing to sync.`);
                return;
              }
              throw error;
            }

            const { owner: parentOwner, repo: parentRepo } = parseRepoFromUrl(parentIssue.repository_url);
            core.info(`Found parent issue ${parentOwner}/${parentRepo}#${parentIssue.number}.`);

            const { projectId, iterationFieldId } = await getProjectMetadata(projectOwner, projectNumber, iterationFieldName);
            const parentProjectItem = await getIssueProjectItem(parentIssue.node_id, projectId, iterationFieldName);

            if (!parentProjectItem) {
              core.info(`Parent issue ${parentOwner}/${parentRepo}#${parentIssue.number} is not in project ${projectOwner}#${projectNumber}.`);
              return;
            }

            const parentIterationId = parentProjectItem.fieldValueByName?.iterationId;
            const parentIterationTitle = parentProjectItem.fieldValueByName?.title ?? '';

            if (!parentIterationId) {
              core.info(`Parent issue ${parentOwner}/${parentRepo}#${parentIssue.number} has no value in field ${iterationFieldName}.`);
              return;
            }

            const subIssueProjectItem = await getIssueProjectItem(issue.node_id, projectId, iterationFieldName);
            let subIssueItemId = subIssueProjectItem?.id;
            const currentIterationId = subIssueProjectItem?.fieldValueByName?.iterationId ?? null;

            if (!subIssueItemId) {
              core.info(`Sub-issue #${issue.number} is not in project yet. Adding it now.`);
              subIssueItemId = await addIssueToProject(projectId, issue.node_id);
            }

            if (currentIterationId === parentIterationId) {
              core.info(`Sub-issue #${issue.number} already has sprint ${parentIterationTitle || parentIterationId}.`);
              return;
            }

            await setIteration(projectId, subIssueItemId, iterationFieldId, parentIterationId);
            core.info(`Copied sprint ${parentIterationTitle || parentIterationId} from parent issue to sub-issue #${issue.number}.`);
