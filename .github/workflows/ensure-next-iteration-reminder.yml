# Назначение: поддерживает в Project V2 reminder draft для следующей или текущей пустой итерации.
# Когда использовать: как reusable workflow для автоматического создания/перемещения напоминания между итерациями.
name: Ensure next iteration reminder

on:
  workflow_call:
    inputs:
      project_owner:
        required: true
        type: string
      project_number:
        required: true
        type: number
      iteration_field_name:
        required: true
        type: string
      reminder_title:
        required: true
        type: string
      current_date_override:
        required: false
        type: string
      auth_mode:
        required: false
        default: pat
        type: string
      installation_owner:
        required: false
        type: string
    secrets:
      project_token:
        required: false
      pat_token:
        required: false
      app_id:
        required: false
      app_private_key:
        required: false

jobs:
  ensure-next-iteration-reminder:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: read
    env:
      AUTH_MODE: ${{ inputs.auth_mode }}
      INSTALLATION_OWNER: ${{ inputs.installation_owner }}
      DIRECT_TOKEN: ${{ secrets.project_token }}
      PAT_TOKEN: ${{ secrets.pat_token }}
      APP_ID: ${{ secrets.app_id }}
      APP_PRIVATE_KEY: ${{ secrets.app_private_key }}

    steps:
      - name: Validate workflow auth configuration
        shell: bash
        run: |
          if [ -n "$DIRECT_TOKEN" ]; then
            exit 0
          fi

          case "$AUTH_MODE" in
            pat)
              if [ -z "$PAT_TOKEN" ]; then
                echo "pat_token secret is required when auth_mode=pat and project_token is not provided" >&2
                exit 1
              fi
              ;;
            app)
              if [ -z "$APP_ID" ] || [ -z "$APP_PRIVATE_KEY" ] || [ -z "$INSTALLATION_OWNER" ]; then
                echo "app_id, app_private_key, and installation_owner are required when auth_mode=app and project_token is not provided" >&2
                exit 1
              fi
              ;;
            *)
              echo "Unsupported auth_mode: $AUTH_MODE" >&2
              exit 1
              ;;
          esac

      - name: Normalize GitHub App private key
        if: ${{ env.DIRECT_TOKEN == '' && env.AUTH_MODE == 'app' }}
        id: normalize-key
        shell: bash
        run: |
          if [[ "$APP_PRIVATE_KEY" == *'\n'* ]]; then
            printf 'private_key<<EOF\n%b\nEOF\n' "$APP_PRIVATE_KEY" >> "$GITHUB_OUTPUT"
          else
            printf 'private_key<<EOF\n%s\nEOF\n' "$APP_PRIVATE_KEY" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub App installation token
        if: ${{ env.DIRECT_TOKEN == '' && env.AUTH_MODE == 'app' }}
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.app_id }}
          private-key: ${{ steps.normalize-key.outputs.private_key }}
          owner: ${{ inputs.installation_owner }}
          skip-token-revoke: true

      - name: Resolve workflow auth token
        id: auth
        shell: bash
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [ -n "$DIRECT_TOKEN" ]; then
            TOKEN="$DIRECT_TOKEN"
          else
            case "$AUTH_MODE" in
              pat)
                TOKEN="$PAT_TOKEN"
                ;;
              app)
                TOKEN="$APP_TOKEN"
                ;;
              *)
                echo "Unsupported auth_mode: $AUTH_MODE" >&2
                exit 1
                ;;
            esac
          fi

          if [ -z "$TOKEN" ]; then
            echo "Resolved token is empty" >&2
            exit 1
          fi

          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Ensure reminder draft exists in target iteration
        uses: actions/github-script@v8
        env:
          PROJECT_OWNER: ${{ inputs.project_owner }}
          PROJECT_NUMBER: ${{ inputs.project_number }}
          ITERATION_FIELD_NAME: ${{ inputs.iteration_field_name }}
          REMINDER_TITLE: ${{ inputs.reminder_title }}
          CURRENT_DATE_OVERRIDE: ${{ inputs.current_date_override }}
        with:
          github-token: ${{ steps.auth.outputs.token }}
          script: |
            const ownerLogin = process.env.PROJECT_OWNER;
            const projectNumber = Number(process.env.PROJECT_NUMBER);
            const iterationFieldName = process.env.ITERATION_FIELD_NAME;
            const reminderTitle = process.env.REMINDER_TITLE;
            const currentDateOverride = process.env.CURRENT_DATE_OVERRIDE;

            function parseCurrentDate(value) {
              if (!value) {
                return new Date();
              }

              const normalizedValue = value.includes('T') ? value : `${value}T00:00:00Z`;
              const parsed = new Date(normalizedValue);

              if (Number.isNaN(parsed.getTime())) {
                throw new Error(`Invalid current_date_override value: ${value}`);
              }

              return parsed;
            }

            const today = parseCurrentDate(currentDateOverride);
            const todayIso = today.toISOString().slice(0, 10);

            const ORGANIZATION_PROJECT_QUERY = `
              query($owner: String!, $number: Int!) {
                organization(login: $owner) {
                  projectV2(number: $number) {
                    id
                    title
                    fields(first: 100) {
                      nodes {
                        __typename
                        ... on ProjectV2FieldCommon {
                          id
                          name
                        }
                        ... on ProjectV2IterationField {
                          configuration {
                            completedIterations {
                              id
                              title
                              startDate
                              duration
                            }
                            iterations {
                              id
                              title
                              startDate
                              duration
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const USER_PROJECT_QUERY = `
              query($owner: String!, $number: Int!) {
                user(login: $owner) {
                  projectV2(number: $number) {
                    id
                    title
                    fields(first: 100) {
                      nodes {
                        __typename
                        ... on ProjectV2FieldCommon {
                          id
                          name
                        }
                        ... on ProjectV2IterationField {
                          configuration {
                            completedIterations {
                              id
                              title
                              startDate
                              duration
                            }
                            iterations {
                              id
                              title
                              startDate
                              duration
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const PROJECT_ITEMS_QUERY = `
              query($projectId: ID!, $after: String) {
                node(id: $projectId) {
                  ... on ProjectV2 {
                    items(first: 100, after: $after) {
                      pageInfo {
                        hasNextPage
                        endCursor
                      }
                      nodes {
                        id
                        content {
                          __typename
                          ... on DraftIssue {
                            id
                            title
                          }
                          ... on Issue {
                            id
                            number
                            title
                          }
                          ... on PullRequest {
                            id
                            number
                            title
                          }
                        }
                        fieldValues(first: 20) {
                          nodes {
                            __typename
                            ... on ProjectV2ItemFieldIterationValue {
                              iterationId
                              title
                              startDate
                              duration
                              field {
                                ... on ProjectV2FieldCommon {
                                  id
                                  name
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const ADD_DRAFT_MUTATION = `
              mutation($input: AddProjectV2DraftIssueInput!) {
                addProjectV2DraftIssue(input: $input) {
                  projectItem {
                    id
                  }
                }
              }
            `;

            const UPDATE_DRAFT_MUTATION = `
              mutation($input: UpdateProjectV2DraftIssueInput!) {
                updateProjectV2DraftIssue(input: $input) {
                  draftIssue {
                    id
                  }
                }
              }
            `;

            const UPDATE_ITERATION_MUTATION = `
              mutation($input: UpdateProjectV2ItemFieldValueInput!) {
                updateProjectV2ItemFieldValue(input: $input) {
                  projectV2Item {
                    id
                  }
                }
              }
            `;

            const DELETE_ITEM_MUTATION = `
              mutation($input: DeleteProjectV2ItemInput!) {
                deleteProjectV2Item(input: $input) {
                  deletedItemId
                }
              }
            `;

            function toUtcDate(value) {
              return new Date(`${value}T00:00:00Z`);
            }

            function addDays(date, days) {
              const result = new Date(date);
              result.setUTCDate(result.getUTCDate() + days);
              return result;
            }

            function sortIterations(iterations) {
              return [...iterations].sort((a, b) => {
                const dateCompare = toUtcDate(a.startDate) - toUtcDate(b.startDate);
                if (dateCompare !== 0) {
                  return dateCompare;
                }

                return a.title.localeCompare(b.title);
              });
            }

            async function getProjectOwnerType(login) {
              const response = await github.request('GET /users/{username}', {
                username: login,
              });

              return response.data.type === 'Organization' ? 'organization' : 'user';
            }

            async function getProjectMetadata(ownerType) {
              const query = ownerType === 'organization'
                ? ORGANIZATION_PROJECT_QUERY
                : USER_PROJECT_QUERY;

              const data = await github.graphql(query, {
                owner: ownerLogin,
                number: projectNumber,
              });

              const project = ownerType === 'organization'
                ? data.organization?.projectV2
                : data.user?.projectV2;

              if (!project) {
                throw new Error(`Project ${ownerLogin}#${projectNumber} was not found.`);
              }

              const iterationField = project.fields.nodes.find((field) =>
                field.__typename === 'ProjectV2IterationField' && field.name === iterationFieldName,
              );

              if (!iterationField) {
                throw new Error(`Iteration field "${iterationFieldName}" was not found in project ${ownerLogin}#${projectNumber}.`);
              }

              const iterations = sortIterations([
                ...(iterationField.configuration?.completedIterations ?? []),
                ...(iterationField.configuration?.iterations ?? []),
              ]);

              return {
                projectId: project.id,
                projectTitle: project.title,
                iterationFieldId: iterationField.id,
                iterations,
              };
            }

            async function getProjectItems(projectId) {
              const items = [];
              let hasNextPage = true;
              let cursor = null;

              while (hasNextPage) {
                const data = await github.graphql(PROJECT_ITEMS_QUERY, {
                  projectId,
                  after: cursor,
                });

                const connection = data.node?.items;
                if (!connection) {
                  throw new Error(`Unable to read items for project ${projectId}.`);
                }

                items.push(...connection.nodes);
                hasNextPage = connection.pageInfo.hasNextPage;
                cursor = connection.pageInfo.endCursor;
              }

              return items;
            }

            function findCurrentIteration(iterations) {
              return iterations.find((iteration) => {
                const start = toUtcDate(iteration.startDate);
                const end = addDays(start, iteration.duration);
                return today >= start && today < end;
              });
            }

            function findNextIteration(iterations, currentIteration) {
              if (currentIteration) {
                return iterations.find((iteration) => toUtcDate(iteration.startDate) > toUtcDate(currentIteration.startDate));
              }

              return iterations.find((iteration) => toUtcDate(iteration.startDate) > today);
            }

            function getItemIterationId(item, iterationFieldId) {
              const value = item.fieldValues?.nodes?.find((fieldValue) =>
                fieldValue.__typename === 'ProjectV2ItemFieldIterationValue'
                && fieldValue.field?.id === iterationFieldId,
              );

              return value?.iterationId ?? null;
            }

            function isPlannedIssue(item) {
              return item.content?.__typename === 'Issue';
            }

            function iterationHasIssues(items, iterationFieldId, iterationId) {
              return items.some((item) =>
                isPlannedIssue(item)
                && getItemIterationId(item, iterationFieldId) === iterationId,
              );
            }

            function isReminderDraft(item) {
              return item.content?.__typename === 'DraftIssue'
                && (item.content.title || '') === reminderTitle;
            }

            async function createReminderDraft(projectId) {
              const response = await github.graphql(ADD_DRAFT_MUTATION, {
                input: {
                  projectId,
                  title: reminderTitle,
                },
              });

              return response.addProjectV2DraftIssue.projectItem.id;
            }

            async function updateReminderDraft(draftIssueId) {
              await github.graphql(UPDATE_DRAFT_MUTATION, {
                input: {
                  draftIssueId,
                  title: reminderTitle,
                },
              });
            }

            async function setReminderIteration(projectId, itemId, iterationFieldId, iterationId) {
              await github.graphql(UPDATE_ITERATION_MUTATION, {
                input: {
                  projectId,
                  itemId,
                  fieldId: iterationFieldId,
                  value: {
                    iterationId,
                  },
                },
              });
            }

            async function deleteProjectItem(projectId, itemId) {
              await github.graphql(DELETE_ITEM_MUTATION, {
                input: {
                  projectId,
                  itemId,
                },
              });
            }

            const ownerType = await getProjectOwnerType(ownerLogin);
            core.info(`Resolved project owner type: ${ownerType}`);

            const project = await getProjectMetadata(ownerType);
            const currentIteration = findCurrentIteration(project.iterations);
            const nextIteration = findNextIteration(project.iterations, currentIteration);
            const items = await getProjectItems(project.projectId);

            if (!currentIteration) {
              core.notice(`No active iteration found for ${todayIso}. Will use the first future iteration as next if available.`);
            } else {
              core.info(`Current iteration: ${currentIteration.title} (${currentIteration.startDate})`);
            }

            if (nextIteration) {
              core.info(`Next iteration: ${nextIteration.title} (${nextIteration.startDate})`);
            }

            const currentHasIssues = currentIteration
              ? iterationHasIssues(items, project.iterationFieldId, currentIteration.id)
              : false;

            if (currentIteration) {
              if (currentHasIssues) {
                core.info(`Current iteration "${currentIteration.title}" already has issues. Reminder should point to the next iteration.`);
              } else {
                core.info(`Current iteration "${currentIteration.title}" has no issues yet. Reminder will stay in the current iteration to keep the swimlane visible.`);
              }
            }

            const targetIteration = currentIteration && !currentHasIssues
              ? currentIteration
              : nextIteration;

            if (!targetIteration) {
              core.notice(`No target iteration found in field "${iterationFieldName}" for project ${ownerLogin}#${projectNumber}. Nothing to do.`);
              return;
            }

            core.info(`Target iteration for reminder: ${targetIteration.title} (${targetIteration.startDate})`);

            const reminderItems = items.filter(isReminderDraft);

            let canonicalItem = reminderItems.find((item) =>
              getItemIterationId(item, project.iterationFieldId) === targetIteration.id,
            ) ?? reminderItems[0];

            if (!canonicalItem) {
              const itemId = await createReminderDraft(project.projectId);
              await setReminderIteration(project.projectId, itemId, project.iterationFieldId, targetIteration.id);
              core.info(`Created reminder draft item in target iteration "${targetIteration.title}".`);
              return;
            }

            if (canonicalItem.content?.__typename !== 'DraftIssue') {
              throw new Error('Canonical reminder item is not a draft issue.');
            }

            if (canonicalItem.content.title !== reminderTitle) {
              await updateReminderDraft(canonicalItem.content.id);
              core.info(`Updated reminder draft title for item ${canonicalItem.id}.`);
            }

            const canonicalIterationId = getItemIterationId(canonicalItem, project.iterationFieldId);
            if (canonicalIterationId !== targetIteration.id) {
              await setReminderIteration(project.projectId, canonicalItem.id, project.iterationFieldId, targetIteration.id);
              core.info(`Moved reminder draft to target iteration "${targetIteration.title}".`);
            }

            const duplicateItems = reminderItems.filter((item) => item.id !== canonicalItem.id);
            for (const duplicateItem of duplicateItems) {
              await deleteProjectItem(project.projectId, duplicateItem.id);
              core.info(`Deleted duplicate reminder item ${duplicateItem.id}.`);
            }

            core.info(`Reminder reconciled successfully in project "${project.projectTitle}".`);
