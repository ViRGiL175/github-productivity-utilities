name: Link PR to Project

on:
  workflow_call:
    inputs:
      project_owner:
        description: Login of the organization or user that owns the Project V2 board
        required: true
        type: string
      project_number:
        description: Project V2 number
        required: true
        type: number
      backlog_repo:
        description: Repository name where backlog issues live
        required: true
        type: string
      backlog_repo_owner:
        description: Owner of the repository where backlog issues live; defaults to project_owner when omitted
        required: false
        type: string
      iteration_field_name:
        description: Name of the iteration field in the project
        required: false
        default: Sprint
        type: string
      status_field_name:
        description: Name of the status field in the project
        required: false
        default: Status
        type: string
      status_done_value:
        description: Status value to set when the PR is closed
        required: false
        default: Done
        type: string
      pull_request_node_id:
        description: Pull request node ID override; falls back to github.event.pull_request.node_id when omitted
        required: false
        type: string
      pull_request_number:
        description: Pull request number override; falls back to github.event.pull_request.number when omitted
        required: false
        type: string
      pull_request_repo_owner:
        description: Pull request repository owner override; falls back to github.event.pull_request.base.repo.owner.login when omitted
        required: false
        type: string
      pull_request_repo_name:
        description: Pull request repository name override; falls back to github.event.pull_request.base.repo.name when omitted
        required: false
        type: string
      pull_request_body:
        description: Pull request body override hint; falls back to the live API body when omitted
        required: false
        type: string
      pull_request_author_login:
        description: Pull request author login override; falls back to github.event.pull_request.user.login when omitted
        required: false
        type: string
      head_ref:
        description: Head ref override; falls back to github.event.pull_request.head.ref when omitted
        required: false
        type: string
      action:
        description: Action override; falls back to github.event.action when omitted
        required: false
        type: string
      auth_mode:
        description: Auth mode used to resolve a token when project_token is not provided
        required: false
        default: pat
        type: string
      installation_owner:
        description: Installation owner used to mint a GitHub App token when auth_mode=app
        required: false
        type: string
    secrets:
      project_token:
        required: false
      pat_token:
        required: false
      app_id:
        required: false
      app_private_key:
        required: false

jobs:
  preflight:
    name: Preflight auth and skip check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: read
    outputs:
      should_skip: ${{ steps.skip-check.outputs.should_skip }}
    env:
      AUTH_MODE: ${{ inputs.auth_mode }}
      INSTALLATION_OWNER: ${{ inputs.installation_owner }}
      DIRECT_TOKEN: ${{ secrets.project_token }}
      PAT_TOKEN: ${{ secrets.pat_token }}
      APP_ID: ${{ secrets.app_id }}
      APP_PRIVATE_KEY: ${{ secrets.app_private_key }}
      PULL_REQUEST_AUTHOR_LOGIN: ${{ inputs.pull_request_author_login || github.event.pull_request.user.login || '' }}

    steps:
      - name: Detect Dependabot PR without available auth
        id: skip-check
        shell: bash
        run: |
          SHOULD_SKIP=false

          case "$AUTH_MODE" in
            pat)
              if [ -z "$DIRECT_TOKEN" ] && [ -z "$PAT_TOKEN" ] && [ "$PULL_REQUEST_AUTHOR_LOGIN" = "dependabot[bot]" ]; then
                SHOULD_SKIP=true
              fi
              ;;
            app)
              if [ -z "$DIRECT_TOKEN" ] && { [ -z "$APP_ID" ] || [ -z "$APP_PRIVATE_KEY" ] || [ -z "$INSTALLATION_OWNER" ]; } && [ "$PULL_REQUEST_AUTHOR_LOGIN" = "dependabot[bot]" ]; then
                SHOULD_SKIP=true
              fi
              ;;
          esac

          echo "should_skip=$SHOULD_SKIP" >> "$GITHUB_OUTPUT"

      - name: Explain skipped Dependabot project sync
        if: ${{ steps.skip-check.outputs.should_skip == 'true' }}
        shell: bash
        run: |
          echo "Skipping project sync for Dependabot PR because the required token secrets are unavailable in this run."

  sync-pr-with-project:
    name: Sync PR with project
    needs: preflight
    if: ${{ needs.preflight.outputs.should_skip != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: read
    env:
      AUTH_MODE: ${{ inputs.auth_mode }}
      INSTALLATION_OWNER: ${{ inputs.installation_owner }}
      DIRECT_TOKEN: ${{ secrets.project_token }}
      PAT_TOKEN: ${{ secrets.pat_token }}
      APP_ID: ${{ secrets.app_id }}
      APP_PRIVATE_KEY: ${{ secrets.app_private_key }}

    steps:
      - name: Validate workflow auth configuration
        shell: bash
        run: |
          if [ -n "$DIRECT_TOKEN" ]; then
            exit 0
          fi

          case "$AUTH_MODE" in
            pat)
              if [ -z "$PAT_TOKEN" ]; then
                echo "pat_token secret is required when auth_mode=pat and project_token is not provided" >&2
                exit 1
              fi
              ;;
            app)
              if [ -z "$APP_ID" ] || [ -z "$APP_PRIVATE_KEY" ] || [ -z "$INSTALLATION_OWNER" ]; then
                echo "app_id, app_private_key, and installation_owner are required when auth_mode=app and project_token is not provided" >&2
                exit 1
              fi
              ;;
            *)
              echo "Unsupported auth_mode: $AUTH_MODE" >&2
              exit 1
              ;;
          esac

      - name: Normalize GitHub App private key
        if: ${{ env.DIRECT_TOKEN == '' && env.AUTH_MODE == 'app' }}
        id: normalize-key
        shell: bash
        run: |
          if [[ "$APP_PRIVATE_KEY" == *'\n'* ]]; then
            printf 'private_key<<EOF\n%b\nEOF\n' "$APP_PRIVATE_KEY" >> "$GITHUB_OUTPUT"
          else
            printf 'private_key<<EOF\n%s\nEOF\n' "$APP_PRIVATE_KEY" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub App installation token
        if: ${{ env.DIRECT_TOKEN == '' && env.AUTH_MODE == 'app' }}
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.app_id }}
          private-key: ${{ steps.normalize-key.outputs.private_key }}
          owner: ${{ inputs.installation_owner }}
          skip-token-revoke: true

      - name: Resolve workflow auth token
        id: auth
        shell: bash
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [ -n "$DIRECT_TOKEN" ]; then
            TOKEN="$DIRECT_TOKEN"
          else
            case "$AUTH_MODE" in
              pat)
                TOKEN="$PAT_TOKEN"
                ;;
              app)
                TOKEN="$APP_TOKEN"
                ;;
              *)
                echo "Unsupported auth_mode: $AUTH_MODE" >&2
                exit 1
                ;;
            esac
          fi

          if [ -z "$TOKEN" ]; then
            echo "Resolved token is empty" >&2
            exit 1
          fi

          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Sync PR metadata with project
        uses: actions/github-script@v8
        env:
          PROJECT_OWNER: ${{ inputs.project_owner }}
          PROJECT_NUMBER: ${{ inputs.project_number }}
          BACKLOG_REPO: ${{ inputs.backlog_repo }}
          BACKLOG_REPO_OWNER: ${{ inputs.backlog_repo_owner || inputs.project_owner }}
          ITERATION_FIELD_NAME: ${{ inputs.iteration_field_name }}
          STATUS_FIELD_NAME: ${{ inputs.status_field_name }}
          STATUS_DONE_VALUE: ${{ inputs.status_done_value }}
          PULL_REQUEST_NODE_ID: ${{ inputs.pull_request_node_id }}
          PULL_REQUEST_NUMBER: ${{ inputs.pull_request_number }}
          PULL_REQUEST_REPO_OWNER: ${{ inputs.pull_request_repo_owner }}
          PULL_REQUEST_REPO_NAME: ${{ inputs.pull_request_repo_name }}
          PULL_REQUEST_BODY: ${{ inputs.pull_request_body }}
          HEAD_REF: ${{ inputs.head_ref }}
          ACTION: ${{ inputs.action }}
        with:
          github-token: ${{ steps.auth.outputs.token }}
          script: |
            const projectOwner = process.env.PROJECT_OWNER;
            const projectNumber = Number(process.env.PROJECT_NUMBER);
            const backlogRepo = process.env.BACKLOG_REPO;
            const backlogRepoOwner = process.env.BACKLOG_REPO_OWNER || projectOwner;
            const iterationFieldName = process.env.ITERATION_FIELD_NAME;
            const statusFieldName = process.env.STATUS_FIELD_NAME;
            const statusDoneValue = process.env.STATUS_DONE_VALUE;
            const pullRequestFromEvent = context.payload.pull_request ?? null;
            const action = process.env.ACTION || context.payload.action || 'opened';
            const pullRequestBodyHint = process.env.PULL_REQUEST_BODY;
            const pullRequestNodeId = process.env.PULL_REQUEST_NODE_ID || pullRequestFromEvent?.node_id || '';
            const pullRequestNumber = Number(process.env.PULL_REQUEST_NUMBER || pullRequestFromEvent?.number || '');
            const pullRequestRepoOwner = process.env.PULL_REQUEST_REPO_OWNER || pullRequestFromEvent?.base?.repo?.owner?.login || context.repo.owner;
            const pullRequestRepoName = process.env.PULL_REQUEST_REPO_NAME || pullRequestFromEvent?.base?.repo?.name || context.repo.repo;
            const headRef = process.env.HEAD_REF || pullRequestFromEvent?.head?.ref || '';

            if (!pullRequestNodeId || !Number.isInteger(pullRequestNumber) || pullRequestNumber <= 0) {
              throw new Error('Pull request context is required. Pass pull_request_node_id and pull_request_number, or run from a pull_request event.');
            }

            if (!pullRequestRepoOwner || !pullRequestRepoName) {
              throw new Error('Pull request repository context is required. Pass pull_request_repo_owner and pull_request_repo_name, or run from a pull_request event.');
            }

            const pullRequest = {
              node_id: pullRequestNodeId,
              number: pullRequestNumber,
              head: {
                ref: headRef,
              },
            };

            const ORGANIZATION_PROJECT_QUERY = `
              query($owner: String!, $number: Int!) {
                organization(login: $owner) {
                  projectV2(number: $number) {
                    id
                    title
                    fields(first: 100) {
                      nodes {
                        __typename
                        ... on ProjectV2FieldCommon {
                          id
                          name
                        }
                        ... on ProjectV2SingleSelectField {
                          options {
                            id
                            name
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const USER_PROJECT_QUERY = `
              query($owner: String!, $number: Int!) {
                user(login: $owner) {
                  projectV2(number: $number) {
                    id
                    title
                    fields(first: 100) {
                      nodes {
                        __typename
                        ... on ProjectV2FieldCommon {
                          id
                          name
                        }
                        ... on ProjectV2SingleSelectField {
                          options {
                            id
                            name
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const ISSUE_PROJECT_ITEMS_QUERY = `
              query($owner: String!, $repo: String!, $issueNum: Int!, $fieldName: String!) {
                repository(owner: $owner, name: $repo) {
                  issue(number: $issueNum) {
                    id
                    projectItems(first: 100) {
                      nodes {
                        id
                        project {
                          id
                        }
                        fieldValueByName(name: $fieldName) {
                          ... on ProjectV2ItemFieldIterationValue {
                            iterationId
                            title
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const PULL_REQUEST_PROJECT_ITEMS_QUERY = `
              query($nodeId: ID!, $fieldName: String!) {
                node(id: $nodeId) {
                  ... on PullRequest {
                    projectItems(first: 100) {
                      nodes {
                        id
                        project {
                          id
                        }
                        fieldValueByName(name: $fieldName) {
                          ... on ProjectV2ItemFieldIterationValue {
                            iterationId
                            title
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const ADD_PROJECT_ITEM_MUTATION = `
              mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                  item {
                    id
                  }
                }
              }
            `;

            const UPDATE_ITERATION_MUTATION = `
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $iterationId: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId
                  itemId: $itemId
                  fieldId: $fieldId
                  value: { iterationId: $iterationId }
                }) {
                  projectV2Item {
                    id
                  }
                }
              }
            `;

            const UPDATE_STATUS_MUTATION = `
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId
                  itemId: $itemId
                  fieldId: $fieldId
                  value: { singleSelectOptionId: $optionId }
                }) {
                  projectV2Item {
                    id
                  }
                }
              }
            `;

            function extractIssueNumber(branchName) {
              const match = /^([0-9]+)-/.exec(branchName || '');
              return match ? Number(match[1]) : null;
            }

            async function getProjectOwnerType(ownerLogin) {
              const response = await github.request('GET /users/{username}', {
                username: ownerLogin,
                headers: {
                  accept: 'application/vnd.github+json',
                  'X-GitHub-Api-Version': '2022-11-28',
                },
              });

              return response.data.type;
            }

            async function getProjectMetadata() {
              const ownerType = await getProjectOwnerType(projectOwner);
              const isOrganization = ownerType === 'Organization';
              const isUser = ownerType === 'User';

              if (!isOrganization && !isUser) {
                throw new Error(`Unsupported project owner type "${ownerType}" for ${projectOwner}.`);
              }

              const query = isOrganization ? ORGANIZATION_PROJECT_QUERY : USER_PROJECT_QUERY;
              const data = await github.graphql(query, {
                owner: projectOwner,
                number: projectNumber,
              });

              const project = isOrganization
                ? data.organization?.projectV2
                : data.user?.projectV2;

              if (!project) {
                throw new Error(`Project ${projectOwner}#${projectNumber} was not found.`);
              }

              const iterationField = project.fields.nodes.find((field) =>
                field?.__typename === 'ProjectV2IterationField' && field.name === iterationFieldName,
              );
              if (!iterationField) {
                throw new Error(`Iteration field "${iterationFieldName}" was not found in project ${projectOwner}#${projectNumber}.`);
              }

              const statusField = project.fields.nodes.find((field) =>
                field?.__typename === 'ProjectV2SingleSelectField' && field.name === statusFieldName,
              );
              if (!statusField) {
                throw new Error(`Status field "${statusFieldName}" was not found in project ${projectOwner}#${projectNumber}.`);
              }

              const doneOption = statusField.options?.find((option) => option.name === statusDoneValue);
              if (!doneOption) {
                throw new Error(`Status option "${statusDoneValue}" was not found in field ${statusFieldName} of project ${projectOwner}#${projectNumber}.`);
              }

              return {
                projectId: project.id,
                projectTitle: project.title,
                iterationFieldId: iterationField.id,
                statusFieldId: statusField.id,
                doneOptionId: doneOption.id,
              };
            }

            async function getPullRequestProjectItem(projectId) {
              const data = await github.graphql(PULL_REQUEST_PROJECT_ITEMS_QUERY, {
                nodeId: pullRequest.node_id,
                fieldName: iterationFieldName,
              });

              return data.node?.projectItems?.nodes?.find((item) => item.project?.id === projectId) ?? null;
            }

            async function getIssueProjectItem(projectId, issueNumber) {
              const data = await github.graphql(ISSUE_PROJECT_ITEMS_QUERY, {
                owner: backlogRepoOwner,
                repo: backlogRepo,
                issueNum: issueNumber,
                fieldName: iterationFieldName,
              });

              return data.repository?.issue?.projectItems?.nodes?.find((item) => item.project?.id === projectId) ?? null;
            }

            async function addPullRequestToProject(projectId) {
              const data = await github.graphql(ADD_PROJECT_ITEM_MUTATION, {
                projectId,
                contentId: pullRequest.node_id,
              });

              return data.addProjectV2ItemById.item.id;
            }

            async function setIteration(projectId, itemId, iterationId) {
              await github.graphql(UPDATE_ITERATION_MUTATION, {
                projectId,
                itemId,
                fieldId: project.iterationFieldId,
                iterationId,
              });
            }

            async function setDoneStatus(projectId, itemId) {
              await github.graphql(UPDATE_STATUS_MUTATION, {
                projectId,
                itemId,
                fieldId: project.statusFieldId,
                optionId: project.doneOptionId,
              });
            }

            async function appendClosingReferenceIfMissing(issueNumber) {
              const closesRef = `Closes ${backlogRepoOwner}/${backlogRepo}#${issueNumber}`;
              const response = await github.request('GET /repos/{owner}/{repo}/pulls/{pull_number}', {
                owner: pullRequestRepoOwner,
                repo: pullRequestRepoName,
                pull_number: pullRequest.number,
                headers: {
                  accept: 'application/vnd.github+json',
                  'X-GitHub-Api-Version': '2022-11-28',
                },
              });

              const currentBody = response.data.body || pullRequestBodyHint || '';
              if (currentBody.includes(closesRef)) {
                core.info('Closing reference already present, skipping.');
                return;
              }

              const suffix = `\n\n<!-- auto-linked -->\n${closesRef}`;
              await github.request('PATCH /repos/{owner}/{repo}/pulls/{pull_number}', {
                owner: pullRequestRepoOwner,
                repo: pullRequestRepoName,
                pull_number: pullRequest.number,
                body: `${currentBody}${suffix}`,
                headers: {
                  accept: 'application/vnd.github+json',
                  'X-GitHub-Api-Version': '2022-11-28',
                },
              });

              core.info(`Appended closing reference ${closesRef} to PR ${pullRequestRepoOwner}/${pullRequestRepoName}#${pullRequest.number}.`);
            }

            const project = await getProjectMetadata();
            core.info(`Resolved project "${project.projectTitle}" (${projectOwner}#${projectNumber}).`);

            if (action === 'closed') {
              const pullRequestProjectItem = await getPullRequestProjectItem(project.projectId);
              if (!pullRequestProjectItem) {
                core.info(`Pull request #${pullRequest.number} is not in project ${projectOwner}#${projectNumber}. Nothing to mark as done.`);
                return;
              }

              await setDoneStatus(project.projectId, pullRequestProjectItem.id);
              core.info(`Set status ${statusFieldName}=${statusDoneValue} for PR #${pullRequest.number}.`);
              return;
            }

            let pullRequestProjectItem = await getPullRequestProjectItem(project.projectId);
            let pullRequestItemId = pullRequestProjectItem?.id;

            if (!pullRequestItemId) {
              pullRequestItemId = await addPullRequestToProject(project.projectId);
              core.info(`Added PR #${pullRequest.number} to project ${projectOwner}#${projectNumber}.`);
              pullRequestProjectItem = { id: pullRequestItemId, fieldValueByName: null };
            } else {
              core.info(`PR #${pullRequest.number} is already in project ${projectOwner}#${projectNumber}.`);
            }

            const issueNumber = extractIssueNumber(headRef);
            if (!issueNumber) {
              core.info(`Could not extract issue number from branch "${headRef}". Skipping sprint sync and closing reference.`);
              return;
            }

            const issueProjectItem = await getIssueProjectItem(project.projectId, issueNumber);
            if (!issueProjectItem) {
              core.info(`Issue #${issueNumber} is not in project ${projectOwner}#${projectNumber}.`);
            } else {
              const issueIterationId = issueProjectItem.fieldValueByName?.iterationId ?? null;
              const issueIterationTitle = issueProjectItem.fieldValueByName?.title ?? '';
              const currentIterationId = pullRequestProjectItem?.fieldValueByName?.iterationId ?? null;

              if (!issueIterationId) {
                core.info(`Issue #${issueNumber} has no value in field ${iterationFieldName}.`);
              } else if (currentIterationId === issueIterationId) {
                core.info(`PR #${pullRequest.number} already has sprint ${issueIterationTitle || issueIterationId}.`);
              } else {
                await setIteration(project.projectId, pullRequestItemId, issueIterationId);
                core.info(`Copied sprint ${issueIterationTitle || issueIterationId} from issue #${issueNumber} to PR #${pullRequest.number}.`);
              }
            }

            await appendClosingReferenceIfMissing(issueNumber);
